name: ctos_companion
description: CTOS Companion - Device Security Monitor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local DB
  hive_flutter: ^1.1.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Network
  dio: ^5.4.3
  http: ^1.2.1

  # Device info
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.1
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  installed_apps: ^1.4.0

  # Charts
  fl_chart: ^0.68.0

  # Audio
  audioplayers: ^6.1.0

  # PDF export
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0

  # Icons
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: ShareTechMono
      fonts:
        - asset: assets/fonts/ShareTechMono-Regular.ttf

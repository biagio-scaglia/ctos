<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CTOS Companion — Device Security Monitor">
  <meta name="theme-color" content="#050A0E">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CTOS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CTOS Companion</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #050A0E;
      color: #00F5FF;
      font-family: monospace;
    }

    /* Loading screen shown before Flutter initializes */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050A0E;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 3rem;
      letter-spacing: 0.5rem;
      color: #00F5FF;
      text-shadow: 0 0 20px #00F5FF88;
      margin: 0 0 0.5rem 0;
    }

    #loading p {
      font-size: 0.75rem;
      letter-spacing: 0.3rem;
      color: #4A7080;
      margin: 0 0 2rem 0;
    }

    #loading-bar-container {
      width: 240px;
      height: 2px;
      background: #0A2533;
      position: relative;
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      background: #00F5FF;
      width: 0%;
      animation: loadAnim 2s ease-in-out forwards;
    }

    @keyframes loadAnim {
      0%   { width: 0%; }
      60%  { width: 80%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>CTOS</h1>
    <p>COMPANION SECURITY SYSTEM</p>
    <div id="loading-bar-container">
      <div id="loading-bar"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      loading.classList.add('hidden');
      setTimeout(function() { loading.remove(); }, 600);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
